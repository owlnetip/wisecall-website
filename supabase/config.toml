# Minimal Supabase config for deploying edge functions.
# See: https://supabase.com/docs/guides/functions/deploy

[functions.wisecall-trial-cap-reached]
verify_jwt = false

[functions.wisecall-kb-search]
verify_jwt = true

[functions.wisecall-live-chat]
verify_jwt = false

# Resend inbound webhook — authenticates via its own inbound secret, not a
# Supabase JWT, so JWT verification must stay off or the webhook 401s.
[functions.wisecall-email-inbound]
verify_jwt = false

# Internal provisioning — called from the Next.js server action with the
# service-role apikey. The function body rejects non-service-role calls.
[functions.wisecall-provision-mor-agent]
verify_jwt = false

# Twilio WhatsApp webhook — Twilio posts form-encoded webhooks verified by
# X-Twilio-Signature inside the function, so JWT verification must stay off.
[functions.wisecall-whatsapp-inbound]
verify_jwt = false

# Vonage SMS inbound webhook — Vonage posts form-encoded messages; no Supabase
# JWT in the request, so JWT verification must stay off.
[functions.wisecall-sms-inbound]
verify_jwt = false

# Internal SMS number provisioning — called from the Next.js server action with
# the service-role key. The function body rejects non-service-role callers.
[functions.wisecall-provision-sms]
verify_jwt = false

[functions.wisecall-action-items-email]
verify_jwt = false

# Property viewing owner-confirm loop — called from voice webhooks / portal
# with a shared secret or service-role key.
[functions.wisecall-viewing-request]
verify_jwt = false

# Day-before / day-of viewing reminders — cron-triggered with a shared secret.
[functions.wisecall-viewing-reminders]
verify_jwt = false
