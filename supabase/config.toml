# Minimal Supabase config for deploying edge functions.
# See: https://supabase.com/docs/guides/functions/deploy

[functions.wisecall-trial-cap-reached]
verify_jwt = false

[functions.wisecall-kb-search]
verify_jwt = true

[functions.wisecall-live-chat]
verify_jwt = false

# Resend inbound webhook — authenticates via its own inbound secret, not a
# Supabase JWT, so JWT verification must stay off or the webhook 401s.
[functions.wisecall-email-inbound]
verify_jwt = false

# Internal provisioning — called from the Next.js server action with the
# service-role apikey. The function body rejects non-service-role calls.
[functions.wisecall-provision-mor-agent]
verify_jwt = false

# Meta WhatsApp Cloud API webhook — Meta calls it unauthenticated (verified via
# hub.verify_token / WHATSAPP_VERIFY_TOKEN), so JWT verification must stay off.
[functions.wisecall-whatsapp-inbound]
verify_jwt = false
