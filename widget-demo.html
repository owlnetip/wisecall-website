<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>WiseCall widget preview</title>
  <style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#eef2f2;color:#172929}
    .bar{height:60px;background:#fff;border-bottom:1px solid rgba(0,0,0,.08);display:flex;align-items:center;padding:0 24px;gap:10px;font-weight:800}
    .bar .dot{width:12px;height:12px;border-radius:50%;background:#cdd6d5}
    .wrap{max-width:760px;margin:60px auto;padding:0 24px;text-align:center}
    .wrap h1{font-size:30px;margin:0 0 8px}
    .wrap p{color:#5d6b69;font-size:16px;line-height:1.6}
    .hint{margin-top:40px;display:inline-block;background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:12px;padding:14px 20px;color:#5d6b69;font-size:14px}
    .err{color:#b3261e;font-weight:700}
  </style>
</head>
<body>
  <div class="bar"><span class="dot"></span><span class="dot"></span><span class="dot"></span>&nbsp;Your website</div>
  <div class="wrap">
    <h1>This is a preview of your chat widget</h1>
    <p>It loads exactly as it would on your real site. Look for the chat bubble in the bottom corner, click it and have a conversation with your agent.</p>
    <div class="hint" id="hint">Loading your agent…</div>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var slug = params.get("agent");
      var hint = document.getElementById("hint");
      if (!slug) {
        hint.innerHTML = '<span class="err">No agent specified.</span> Open this from your dashboard.';
        return;
      }
      hint.textContent = "Your agent is live in the corner →";
      var s = document.createElement("script");
      s.src = "/widget.js";
      s.async = true;
      s.setAttribute("data-agent", slug);
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
